[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

# Dependencies (OpenZeppelin, forge-std) are git submodules under lib/.
# After cloning: `forge install` (or `git submodule update --init --recursive`).
# Remappings are in remappings.txt.

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
base_sepolia = "https://base-sepolia.g.alchemy.com/v2/EdzxLIqGZZycgUrfb6ea7"
anvil = "http://127.0.0.1:8545"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api.etherscan.io/v2/api" }
